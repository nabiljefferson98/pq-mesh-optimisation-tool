# .pre-commit-config.yaml
# Pre-commit hooks that run automatically before each git commit.
# Install: pip install pre-commit && pre-commit install
# Run manually against all files: pre-commit run --all-files

repos:
  # ── General file hygiene ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace      # Remove trailing spaces
      - id: end-of-file-fixer        # Ensure files end with a newline
      - id: check-yaml               # Validate YAML syntax
      - id: check-json               # Validate JSON syntax
      - id: check-merge-conflict     # Catch leftover merge conflict markers
      - id: check-added-large-files  # Block accidentally committed large files
        args: ["--maxkb=1000"]

  # ── Code formatting ──────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=88"]

  # ── Import ordering ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=88"]

  # ── Linting ──────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-pyproject]
        # Config is read from pyproject.toml [tool.flake8]

  # ── Security scanning (src/ only — skip examples/scripts) ────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "src/", "-ll", "--quiet"]
        pass_filenames: false
